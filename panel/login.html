<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giris - Kurban Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="icon" href="../assets/images/logo.png">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="../assets/images/logo.png" alt="Logo">
            <h1>Kurban Panel</h1>
            <p>Yonetim paneline giris yapin</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Kullanici Adi</label>
                    <input type="text" id="username" autocomplete="username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Sifre</label>
                    <input type="password" id="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">Giris Yap</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>
        </div>
    </div>

    <script src="js/panel-api.js"></script>
    <script src="js/panel-auth.js"></script>
    <script>
        // If already logged in, redirect
        (function() {
            const token = localStorage.getItem('panel_token');
            const user = localStorage.getItem('panel_user');
            if (token && user) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.exp > Math.floor(Date.now() / 1000)) {
                        const u = JSON.parse(user);
                        const defaults = { admin: 'durum.html', kesim: 'kesim.html', parcalama: 'parcalama.html' };
                        window.location.href = defaults[u.role] || 'kesim.html';
                    }
                } catch(e) {}
            }
        })();

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Giris yapiliyor...';
            errorMsg.textContent = '';

            try {
                await login(username, password);
            } catch (err) {
                errorMsg.textContent = err.message || 'Giris basarisiz';
                btn.disabled = false;
                btn.textContent = 'Giris Yap';
            }
        }
    </script>
</body>
</html>
