<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genel Durum - Kurban Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="icon" href="../assets/images/logo.png">
</head>
<body>
    <nav id="panel-nav"></nav>

    <main class="panel-content">
        <h1 class="panel-title">Genel Durum</h1>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card">
                <div class="number" id="totalKurban">0</div>
                <div class="label">Toplam Kurban</div>
            </div>
            <div class="summary-card" style="border-top-color: #f44336;">
                <div class="number" id="kesilen">0</div>
                <div class="label">Kesilen</div>
            </div>
            <div class="summary-card" style="border-top-color: #4caf50;">
                <div class="number" id="kalan">0</div>
                <div class="label">Kalan</div>
            </div>
            <div class="summary-card" style="border-top-color: #2196f3;">
                <div class="number" id="islenen">0</div>
                <div class="label">Islenen</div>
            </div>
            <div class="summary-card" style="border-top-color: #ff9800;">
                <div class="number" id="isleniyor">0</div>
                <div class="label">Isleniyor</div>
            </div>
            <div class="summary-card" style="border-top-color: #9c27b0;">
                <div class="number" id="parcaBekliyor">0</div>
                <div class="label">Bekliyor</div>
            </div>
            <div class="summary-card" style="border-top-color: #607d8b;">
                <div class="number" id="masaSayisi">0</div>
                <div class="label">Masa Sayisi</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="chart-grid">
            <div class="chart-card">
                <h3>Kesim Durumu</h3>
                <canvas id="kesimChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Parcalama Durumu</h3>
                <canvas id="parcalamaChart"></canvas>
            </div>
        </div>

        <!-- Performance -->
        <div class="chart-grid" id="perfSection" style="display:none;">
            <div class="panel-card perf-card">
                <div class="panel-card-header">Kesim Performansi</div>
                <div id="kesimPerf" class="perf-content"></div>
            </div>
            <div class="panel-card perf-card">
                <div class="panel-card-header">Parcalama Performansi</div>
                <div id="parcalamaPerf" class="perf-content"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="js/panel-api.js"></script>
    <script src="js/panel-auth.js?v=2"></script>
    <script src="js/panel-nav.js?v=3"></script>
    <script src="js/durum.js?v=7"></script>
</body>
</html>
